<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ComCoast 3D Viewer</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    height: 100%;
    background: #ffffff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

#info {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 8px 12px;
    border-radius: 4px;
    font-size: 13px;
    color: white;
}

#status {
    position: absolute;
    bottom: 70px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 12px;
    color: white;
}

#buttons {
    position: absolute;
    bottom: 15px;
    width: 100%;
    text-align: center;
}

button {
    padding: 10px 25px;
    margin: 0 10px;
    font-size: 15px;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: #222;
    color: white;
    transition: 0.3s;
}

button:hover {
    background: #555;
}

canvas { display: block; }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.164.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.164.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<div id="info">Drag to rotate, scroll to zoom, right-drag to pan.</div>
<div id="status">Loading...</div>

<div id="buttons">
    <button onclick="loadModel('Pre')">Pre</button>
    <button onclick="loadModel('During')">During</button>
    <button onclick="loadModel('Post')">Post</button>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 1, 3);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1;
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
dirLight.position.set(5, 10, 7.5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 2048;
dirLight.shadow.mapSize.height = 2048;
scene.add(dirLight);

// Shadow ground
const planeGeometry = new THREE.PlaneGeometry(20, 20);
const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.15 });
const plane = new THREE.Mesh(planeGeometry, planeMaterial);
plane.rotation.x = -Math.PI / 2;
plane.position.y = -0.01;
plane.receiveShadow = true;
scene.add(plane);

const statusEl = document.getElementById('status');
let currentModel = null;

window.loadModel = function(name) {

    if (statusEl) statusEl.textContent = `Loading ComCoast_${name}...`;

    if (currentModel) {
        scene.remove(currentModel);
        currentModel.traverse(child => {
            if (child.isMesh) {
                child.geometry.dispose();
                child.material.dispose();
            }
        });
        currentModel = null;
    }

    const mtlLoader = new MTLLoader();
    mtlLoader.setPath('./');

    mtlLoader.load(`ComCoast_${name}.mtl`, materials => {

        materials.preload();

        const objLoader = new OBJLoader();
        objLoader.setMaterials(materials);
        objLoader.setPath('./');

        objLoader.load(`ComCoast_${name}.obj`, object => {

            object.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            const box = new THREE.Box3().setFromObject(object);
            const size = new THREE.Vector3();
            box.getSize(size);
            const center = new THREE.Vector3();
            box.getCenter(center);

            const maxDim = Math.max(size.x, size.y, size.z) || 1;
            const scale = 1.5 / maxDim;
            object.scale.multiplyScalar(scale);

            box.setFromObject(object);
            box.getCenter(center);
            object.position.sub(center);

            object.rotation.x = -Math.PI / 2;

            scene.add(object);
            currentModel = object;

            if (statusEl) statusEl.textContent = `ComCoast_${name} loaded.`;

        });

    });
};

loadModel('Pre');

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
